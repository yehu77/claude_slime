[pytest]
addopts = -p no:cacheprovider
norecursedirs =
    .git
    .pytest_cache
    __pycache__
    archive
markers =
    slow: long-running test that spawns subprocesses or exercises large integration flows
    integration: cross-module or end-to-end integration test
    mainline: offline gate for task assets, native runtime, and the runtime-observed data path
