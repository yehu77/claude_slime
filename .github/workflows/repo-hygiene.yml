name: Repo Hygiene

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  artifact-gate:
    runs-on: windows-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check repository hygiene
        run: python -B -m pycodeagent.dev.repo_hygiene check
